services:
  # CanTrack CRM (Node.js + React)
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - OPTIMUS_URL=http://optimus-rutas:8000
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      optimus-rutas:
        condition: service_started
    networks:
      - cantrack-network
      - postgresql_default   # join CasaOS postgres network

  # Optimus_rutas (Python - Route Optimization)
  optimus-rutas:
    build:
      context: ./Optimus_rutas
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://casaos:casaos@postgresql:5432/casaos
      - MAPBOX_TOKEN=MAPBOX_TOKEN_REMOVED
    restart: unless-stopped
    networks:
      - cantrack-network
      - postgresql_default

volumes:
  optimus-data:

networks:
  cantrack-network:
    driver: bridge
  postgresql_default:
    external: true   # CasaOS-managed postgres network
