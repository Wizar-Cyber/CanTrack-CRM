version: '3.8'

services:
  # CanTrack CRM (Node.js + React)
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://casaos:casaos@host.docker.internal:5432/casaos
      - OPTIMUS_URL=http://optimus-rutas:8000
    env_file:
      - .env
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - cantrack-network

  # Optimus_rutas (Python - Route Optimization)
  optimus-rutas:
    build:
      context: ./Optimus_rutas
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///data/routes.db
    volumes:
      - optimus-data:/app/data
    restart: unless-stopped

  # Nginx (Reverse Proxy)
  nginx:
    image: nginx:alpine
    ports:
      - "8888:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    restart: unless-stopped

volumes:
  optimus-data:

networks:
  cantrack-network:
    driver: bridge
  default:
    name: cantrack-network