<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <title>Optimus · Rutas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>

  <header class="topbar">
    <div class="topbar-row">
      <div class="brand">
        <div class="brand-icon">O</div>
        <span class="brand-name">Optimus</span>
      </div>
      <div class="topbar-actions">
        <div class="unit-toggle" role="group">
          <button class="unit-btn is-active" data-unit="km" type="button">km</button>
          <button class="unit-btn" data-unit="mi" type="button">mi</button>
        </div>
        <button class="icon-btn" id="btn-settings" type="button" aria-label="Ajustes">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
      </div>
    </div>
    <nav class="tabs" role="tablist">
      <button class="tab is-active" data-view="list" role="tab">Mis rutas</button>
      <button class="tab" data-view="create" role="tab">Nueva ruta</button>
    </nav>
  </header>

  <main id="app">

    <!-- ═══════════════ Vista: lista ═══════════════ -->
    <section id="view-list" class="view is-active">
      <div class="filters">
        <button class="filter is-active" data-status="">Todas</button>
        <button class="filter" data-status="draft">Borrador</button>
        <button class="filter" data-status="pending">Pendiente</button>
        <button class="filter" data-status="active">Activa</button>
        <button class="filter" data-status="in_progress">En progreso</button>
        <button class="filter" data-status="paused">Pausada</button>
        <button class="filter" data-status="completed">Completada</button>
      </div>

      <div id="routes-list" class="routes-list" aria-live="polite"></div>

      <div id="empty-state" class="empty-state hidden">
        <div class="empty-icon">🗺️</div>
        <p class="empty-title">Sin rutas todavía</p>
        <p class="empty-text">Crea tu primera ruta optimizada con el botón +</p>
      </div>

      <button class="fab" id="fab-new" aria-label="Nueva ruta">+</button>
    </section>

    <!-- ═══════════════ Vista: crear ═══════════════ -->
    <section id="view-create" class="view">
      <h1 class="page-title">Nueva ruta</h1>

      <form id="form-create" class="form" autocomplete="off">
        <div class="field">
          <label for="f-name">Nombre de la ruta</label>
          <input type="text" id="f-name" required maxlength="200" placeholder="Ej: Toronto Norte — Lunes">
        </div>

        <div class="field">
          <label for="f-start">
            Dirección de salida
            <button type="button" class="link-btn" id="btn-use-home" hidden>↺ usar mi base</button>
          </label>
          <div class="input-with-status">
            <input type="text" id="f-start" required minlength="5" maxlength="300" placeholder="1200 Bay St, Toronto, ON">
            <span class="status-pill" id="status-start"></span>
          </div>
        </div>

        <div class="field">
          <label>Paradas <span class="hint" id="stops-count">(0/30)</span></label>
          <ul id="stops-list" class="stops-input-list"></ul>
          <div class="add-stop">
            <input type="text" id="f-stop" minlength="5" maxlength="300" placeholder="Agregar dirección...">
            <button type="button" id="btn-add-stop" class="btn-secondary">+ Agregar</button>
          </div>
        </div>

        <div class="field-row">
          <div class="field">
            <label for="f-speed">Velocidad prom. <span class="speed-unit">(km/h)</span></label>
            <input type="number" id="f-speed" min="5" max="200" value="30" step="1">
          </div>
          <div class="field checkbox-field">
            <label>
              <input type="checkbox" id="f-return">
              Volver al inicio
            </label>
          </div>
        </div>

        <div class="field">
          <label for="f-notes">Notas</label>
          <textarea id="f-notes" rows="2" maxlength="2000" placeholder="Opcional..."></textarea>
        </div>

        <div class="actions">
          <button type="submit" class="btn-primary" id="btn-submit">Optimizar y guardar</button>
        </div>

        <div id="form-error" class="form-error hidden"></div>
      </form>
    </section>

    <!-- ═══════════════ Vista: detalle ═══════════════ -->
    <section id="view-detail" class="view">
      <button class="back-btn" id="btn-back">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        Volver
      </button>
      <div id="detail-content"></div>
    </section>

  </main>

  <!-- ═══════════════ Modal: ajustes ═══════════════ -->
  <div id="settings-modal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-backdrop" data-close-modal></div>
    <div class="modal-panel">
      <div class="modal-handle"></div>
      <header class="modal-head">
        <h2>Ajustes</h2>
        <button class="icon-btn" data-close-modal aria-label="Cerrar" style="background:var(--surface-2);border-color:var(--border);color:var(--text-2);">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </header>
      <div class="modal-body">
        <div class="field">
          <label for="s-home">Mi punto de salida <span class="hint">(base / depósito)</span></label>
          <p class="field-help">Esta dirección se pre-rellena al crear una nueva ruta.</p>
          <div class="input-with-status">
            <input type="text" id="s-home" maxlength="300" placeholder="Ej: 20 Wellington St E, Toronto, ON">
            <span class="status-pill" id="status-home"></span>
          </div>
        </div>
        <div class="field" style="margin-top:16px">
          <label>Unidades de distancia</label>
          <p class="field-help">Solo afecta la visualización. Los cálculos internos son siempre en km.</p>
          <div class="unit-toggle wide">
            <button class="unit-btn is-active" data-unit-modal="km" type="button">Kilómetros (km)</button>
            <button class="unit-btn" data-unit-modal="mi" type="button">Millas (mi)</button>
          </div>
        </div>
        <div class="modal-foot">
          <button class="btn-secondary" data-close-modal type="button">Cancelar</button>
          <button class="btn-primary" id="btn-save-settings" type="button">Guardar</button>
        </div>
      </div>
    </div>
  </div>

  <div id="loader" class="loader hidden">
    <div class="loader-spinner"></div>
    <span id="loader-text">Cargando...</span>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="/app.js"></script>
</body>
</html>
